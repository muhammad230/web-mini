[deploy]
startCommand = "php artisan storage:link --force && php artisan migrate --force && php artisan db:seed --class=AdminSeeder --force && php artisan db:seed --class=SiteContentSeeder --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
APP_URL = "https://web-mini-production.up.railway.app"
SESSION_DRIVER = "file"
SESSION_SECURE_COOKIE = "true"
